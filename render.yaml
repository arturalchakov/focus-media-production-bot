services:
  - type: worker
    name: focus-media-production-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: MANAGER_CHAT_ID
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./bot.db
      - key: MAX_TOKENS_DIAGNOSIS
        value: "800"
      - key: MAX_TOKENS_CONTENT
        value: "1200"
      - key: FOLLOWUP_DELAYS_HOURS
        value: "24,48,72"
